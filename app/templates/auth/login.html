{% extends "base.html" %}

{% block title %}登录 - 固定资产管理系统{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-xl-6 col-lg-8 col-md-9">
            <div class="card o-hidden border-0 shadow-lg my-5">
                <div class="card-body p-0">
                    <div class="row">
                        <div class="col-lg-12">
                            <div class="p-5">
                                <div class="text-center">
                                    <div class="mb-4">
                                        <i class="bi bi-boxes" style="font-size: 4rem; color: #4e73df;"></i>
                                    </div>
                                    <h1 class="h4 text-gray-900 mb-4">固定资产管理系统</h1>
                                </div>
                                
                                <form method="POST" action="{{ url_for('auth.login') }}">
                                    <div class="form-group mb-3">
                                        <label for="username" class="form-label">用户名</label>
                                        <input type="text" class="form-control form-control-user" id="username" name="username" placeholder="请输入用户名" required>
                                    </div>
                                    <div class="form-group mb-3">
                                        <label for="password" class="form-label">密码</label>
                                        <input type="password" class="form-control form-control-user" id="password" name="password" placeholder="请输入密码" required>
                                    </div>
                                    <div class="form-group mb-3">
                                        <div class="form-check">
                                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                            <label class="form-check-label" for="remember">记住我</label>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-user btn-block w-100 py-2">
                                        登录
                                    </button>
                                </form>
                                <hr>
                                <div class="text-center">
                                    <a class="small" href="{{ url_for('auth.register') }}">还没有账号？点击注册</a>
                                </div>
                                <div class="text-center mt-3">
                                    <div class="small text-muted">
                                        <p>测试账号：</p>
                                        <p>管理员：admin / admin123</p>
                                        <p>部门经理：tech_manager / manager123</p>
                                        <p>普通员工：employee1 / employee123</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .min-vh-100 {
        min-height: 100vh;
    }
    
    .card {
        border-radius: 1rem;
    }
    
    .form-control-user {
        border-radius: 10rem;
        padding: 1.25rem 1rem;
    }
    
    .btn-user {
        border-radius: 10rem;
        font-size: 0.9rem;
        font-weight: 600;
    }
</style>
{% endblock %}
